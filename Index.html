  <style>
    /* ── Reset & Base ── */
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-track { background: #EDF2F7; border-radius: 99px; }
    ::-webkit-scrollbar-thumb { background: #94A3B8; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #2B6CB0; }
    [x-cloak] { display: none !important; }

    /* ── Sidebar ── */
    .sidebar { background: linear-gradient(180deg, #1A3A66 0%, #0F2140 100%); }
    .nav-item { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:12px; font-size:12px; font-weight:600; color:#93C5FD; transition:all .18s ease; cursor:pointer; border:none; background:none; width:100%; text-align:left; letter-spacing:.01em; }
    .nav-item:hover { background:rgba(59,130,246,.12); color:#BFDBFE; }
    .nav-item.active { background:rgba(43,108,176,.4); color:#fff; box-shadow:inset 3px 0 0 #60A5FA; }
    .nav-item .nav-icon { width:18px; text-align:center; font-size:13px; opacity:.85; }
    .nav-label { font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#3B82F6; padding:0 16px; margin:6px 0 4px; }
    .nav-divider { height:1px; background:rgba(59,130,246,.12); margin:8px 16px; }

    /* ── Cards ── */
    .card { background:#fff; border-radius:16px; border:1px solid #E2E8F0; box-shadow:0 1px 3px 0 rgba(0,0,0,.06); }
    .card-blue { background:linear-gradient(135deg,#2B6CB0 0%,#1A3A66 100%); border:none; }
    .stat-card { border-radius:16px; border:1px solid #E2E8F0; background:#fff; padding:20px; box-shadow:0 1px 3px 0 rgba(0,0,0,.06); transition:box-shadow .2s,transform .2s; }
    .stat-card:hover { box-shadow:0 4px 12px rgba(43,108,176,.12); transform:translateY(-1px); }
    .stat-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; }

    /* ── Buttons ── */
    .btn { display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:700; padding:10px 18px; border-radius:12px; border:none; cursor:pointer; transition:all .18s ease; letter-spacing:.01em; white-space:nowrap; }
    .btn-primary { background:#2B6CB0; color:#fff; box-shadow:0 4px 14px rgba(43,108,176,.25); }
    .btn-primary:hover { background:#1E4E8C; box-shadow:0 6px 20px rgba(43,108,176,.35); transform:translateY(-1px); }
    .btn-accent { background:#DD6B20; color:#fff; box-shadow:0 4px 14px rgba(221,107,32,.2); }
    .btn-accent:hover { background:#C05621; box-shadow:0 6px 20px rgba(221,107,32,.3); transform:translateY(-1px); }
    .btn-ghost { background:#EDF2F7; color:#475569; }
    .btn-ghost:hover { background:#E2E8F0; color:#1E293B; }
    .btn-danger { background:#FEF2F2; color:#DC2626; border:1px solid #FECACA; }
    .btn-danger:hover { background:#DC2626; color:#fff; }
    .btn-sm { padding:7px 12px; font-size:11px; border-radius:9px; gap:5px; }
    .btn-icon { width:36px; height:36px; padding:0; justify-content:center; border-radius:10px; }
    .btn-icon-sm { width:28px; height:28px; padding:0; justify-content:center; border-radius:8px; font-size:10px; }

    /* ── Badges ── */
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:10px; font-weight:700; letter-spacing:.03em; }
    .badge-blue { background:#DBEAFE; color:#1E4E8C; }
    .badge-green { background:#D1FAE5; color:#065F46; }
    .badge-amber { background:#FEF3C7; color:#92400E; }
    .badge-red { background:#FEE2E2; color:#991B1B; }
    .badge-gray { background:#F1F5F9; color:#475569; }
    .badge-orange { background:#FFEDD5; color:#9C4221; }
    .badge-teal { background:#CCFBF1; color:#0F766E; }
    .badge-purple { background:#EDE9FE; color:#5B21B6; }

    /* ── Table ── */
    .data-table { width:100%; font-size:12px; border-collapse:collapse; }
    .data-table thead tr { border-bottom:2px solid #EDF2F7; }
    .data-table thead th { padding:12px 16px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:#94A3B8; white-space:nowrap; text-align:left; background:#F8FAFC; }
    .data-table thead th:first-child { border-radius:12px 0 0 0; }
    .data-table thead th:last-child { border-radius:0 12px 0 0; }
    .data-table tbody tr { border-bottom:1px solid #F1F5F9; transition:background .1s; }
    .data-table tbody tr:hover { background:#F0F7FF; }
    .data-table tbody td { padding:12px 16px; color:#334155; vertical-align:middle; }
    .data-table tbody tr:last-child { border-bottom:none; }

    /* ── Form Controls ── */
    .form-input { width:100%; background:#F8FAFC; border:1.5px solid #E2E8F0; border-radius:12px; padding:10px 14px; font-size:12px; font-family:'Inter',sans-serif; color:#1E293B; transition:border-color .15s,box-shadow .15s; outline:none; }
    .form-input:focus { border-color:#2B6CB0; box-shadow:0 0 0 3px rgba(43,108,176,.12); background:#fff; }
    .form-input::placeholder { color:#94A3B8; }
    .form-label { display:block; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:#64748B; margin-bottom:6px; }
    .search-wrap { position:relative; }
    .search-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#94A3B8; font-size:11px; pointer-events:none; }
    .search-wrap .form-input { padding-left:38px; }

    /* ── Modals ── */
    .modal-backdrop { position:fixed; inset:0; background:rgba(15,33,64,.55); backdrop-filter:blur(4px); z-index:55; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-box { background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(15,33,64,.25); width:100%; position:relative; }
    .modal-header { padding:20px 24px; border-bottom:1px solid #EDF2F7; display:flex; align-items:center; justify-content:space-between; border-radius:20px 20px 0 0; background:linear-gradient(90deg,#F0F7FF 0%,#fff 100%); }
    .modal-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .modal-body { padding:24px; }
    .modal-footer { padding:16px 24px; border-top:1px solid #EDF2F7; display:flex; justify-content:flex-end; gap:10px; }
    .modal-close { width:32px; height:32px; border-radius:10px; background:#F1F5F9; color:#64748B; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition:background .15s,color .15s; }
    .modal-close:hover { background:#FEE2E2; color:#DC2626; }

    /* ── Mobile Bottom Nav ── */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:50; background:#1A3A66; border-top:1px solid rgba(59,130,246,.2); padding-bottom:env(safe-area-inset-bottom,0px); }
    .bottom-nav-item { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; flex:1; padding:10px 4px; font-size:9px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:#60A5FA; transition:color .15s; cursor:pointer; border:none; background:none; }
    .bottom-nav-item.active { color:#fff; }
    .bottom-nav-item i { font-size:17px; }
    .bottom-nav-item.active i { filter:drop-shadow(0 0 6px rgba(96,165,250,.8)); }

    /* ── Drawer ── */
    .drawer-overlay { position:fixed; inset:0; background:rgba(15,33,64,.6); z-index:55; backdrop-filter:blur(4px); }
    .drawer-panel { position:fixed; bottom:0; left:0; right:0; z-index:60; background:linear-gradient(180deg,#1A3A66 0%,#0F2140 100%); border-radius:24px 24px 0 0; max-height:85vh; overflow-y:auto; padding:20px; padding-bottom:env(safe-area-inset-bottom,20px); }

    /* ── Misc ── */
    @media (max-width:767px) {
      .mobile-content { padding:12px 12px 90px 12px !important; }
      .modal-box { border-radius:20px 20px 0 0 !important; margin:0 !important; position:fixed !important; bottom:0 !important; left:0 !important; right:0 !important; max-height:92vh; }
      .modal-backdrop { align-items:flex-end !important; padding:0 !important; }
    }
    .rack-chassis { background:linear-gradient(180deg,#0D1B2A 0%,#081428 100%); border-radius:14px; }
    .rack-slot { border-radius:6px; cursor:pointer; transition:all .15s; }
    .rack-slot:hover { opacity:.85; }
    .rack-slot.filled { background:linear-gradient(90deg,#1E3A66 0%,#1A3A55 100%); border-left:3px solid #2B6CB0; }
    .rack-slot.empty { background:rgba(43,108,176,.04); border:1px dashed rgba(43,108,176,.2); }
    .rack-slot.empty:hover { background:rgba(43,108,176,.08); border-color:rgba(43,108,176,.4); }
    .wiki-timeline::before { content:''; position:absolute; left:18px; top:0; bottom:0; width:2px; background:linear-gradient(180deg,#2B6CB0,#60A5FA); z-index:0; border-radius:2px; }
    .tab-content { animation:tabIn .2s ease; }
    @keyframes tabIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .toggle-track { position:relative; display:inline-flex; width:40px; height:22px; }
    .toggle-track input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; cursor:pointer; inset:0; background:#CBD5E1; border-radius:999px; transition:.2s; }
    .toggle-slider:before { content:""; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    input:checked + .toggle-slider { background:#2B6CB0; }
    input:checked + .toggle-slider:before { transform:translateX(18px); }
    .toast { background:#1A3A66; border:1px solid rgba(59,130,246,.25); color:#fff; border-radius:14px; padding:14px 18px; box-shadow:0 8px 25px rgba(15,33,64,.3); font-size:12px; font-weight:600; display:flex; align-items:flex-start; gap:12px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-title { font-size:18px; font-weight:800; color:#1A3A66; letter-spacing:-.02em; }
    .page-subtitle { font-size:11px; color:#94A3B8; font-weight:500; margin-top:2px; }
    .spinner { width:20px; height:20px; border:2.5px solid rgba(43,108,176,.2); border-top-color:#2B6CB0; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .pw-row .pw-actions { opacity:0; transition:opacity .15s; }
    .pw-row:hover .pw-actions { opacity:1; }
    .seg-control { background:#EDF2F7; border-radius:10px; padding:3px; display:inline-flex; gap:2px; }
    .seg-btn { padding:6px 14px; border-radius:8px; font-size:11px; font-weight:700; border:none; cursor:pointer; transition:all .15s; color:#64748B; background:transparent; }
    .seg-btn.active { background:#fff; color:#1A3A66; box-shadow:0 1px 3px rgba(0,0,0,.1); }
    .empty-state { display:flex; flex-direction:column; align-items:center; gap:12px; padding:48px 24px; }
    .empty-icon { width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:22px; background:#F0F7FF; color:#60A5FA; }
  </style>
</head>
