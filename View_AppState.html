<script>
function appState(
  loadChecklistReport() {
  if (typeof google === 'undefined' || !google.script) {
    this.showToast('Hanya tersedia di GAS WebApp.', 'error');
    return;
  }
  this.clReportLoading = true;
  this.clReportData    = null;
  google.script.run
    .withSuccessHandler(res => {
      this.clReportLoading = false;
      if (res.success) {
        this.clReportData  = res;
        this.clReportYears = res.years || [];
        this.clReportSites = res.sites || [];
      } else {
        this.showToast('Gagal load report: ' + (res.message || ''), 'error');
      }
    })
    .withFailureHandler(err => {
      this.clReportLoading = false;
      this.showToast('Error: ' + err.message, 'error');
    })
    .getChecklistReport(this.clReportFilter);
},

openClSignModal(mode, formId = null) {
  this.clExportMode   = mode;
  this.clExportFormId = formId;
  this.showClSignModal = true;
},

doExportChecklistExcel() {
  this.showClSignModal  = false;
  this.clExportLoading  = true;
  this.clExportMsg      = 'Membuat file Excel...';
  google.script.run
    .withSuccessHandler(res => {
      this.clExportLoading = false;
      if (res.success) {
        this.showToast('✅ ' + res.message, 'success');
        setTimeout(() => window.open(res.url, '_blank'), 300);
      } else {
        this.showToast('Export gagal: ' + res.message, 'error');
      }
    })
    .withFailureHandler(err => {
      this.clExportLoading = false;
      this.showToast('Error: ' + err.message, 'error');
    })
    .exportChecklistToSheets(this.clExportFormId, this.clSignConfig);
},

doExportChecklistPdf() {
  this.showClSignModal  = false;
  this.clExportLoading  = true;
  this.clExportMsg      = 'Membuat PDF...';
  google.script.run
    .withSuccessHandler(res => {
      this.clExportLoading = false;
      if (res.success && res.base64) {
        const byteChars  = atob(res.base64);
        const byteArrays = [];
        for (let i = 0; i < byteChars.length; i += 512) {
          const slice = byteChars.slice(i, i + 512);
          const bytes = new Array(slice.length);
          for (let j = 0; j < slice.length; j++) bytes[j] = slice.charCodeAt(j);
          byteArrays.push(new Uint8Array(bytes));
        }
        const blob = new Blob(byteArrays, { type: 'application/pdf' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = res.fileName || 'Checklist.pdf';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        this.showToast('✅ PDF berhasil diunduh!', 'success');
      } else if (res.pdfFailed) {
        this.showToast('PDF gagal, membuka Sheets...', 'error');
        setTimeout(() => window.open(res.sheetsUrl, '_blank'), 500);
      } else {
        this.showToast('Export gagal: ' + (res.message || ''), 'error');
      }
    })
    .withFailureHandler(err => {
      this.clExportLoading = false;
      this.showToast('Error: ' + err.message, 'error');
    })
    .exportChecklistToPdf(this.clExportFormId, this.clSignConfig);
},

      }
    })
    .withFailureHandler(err => {
      this.clExportLoading = false;
      this.showToast('Error: ' + err.message, 'error');
    })
    .exportChecklistBatchToPdf(this.clSelectedForms, this.clSignConfig);
},

    // ── Init ──────────────────────────────────────────────────

    // ── Report: populate available years setelah fetchData ────
    _populateReportYears() {
      const years = [...new Set(
        this.incidents
          .map(r => {
            const v = r.Tanggal;
            if (!v) return null;
            const d = new Date(v);
            return isNaN(d) ? null : d.getFullYear().toString();
          })
          .filter(Boolean)
      )].sort().reverse();
      this.reportAvailableYears = years;
      // Auto-set tahun ke tahun sekarang jika ada
      const thisYear = new Date().getFullYear().toString();
      if (!this.reportFilter.year && years.includes(thisYear)) {
        this.reportFilter.year = thisYear;
      }
    },

    // ── Fetch All Data from GAS ───────────────────────────────
    fetchData() {
      this.loading = true;

      // Timeout guard: jika GAS tidak merespons dalam 15 detik
      const timeoutId = setTimeout(() => {
        if (this.initialLoading) {
          this.initialLoading = false;
          this.loading        = false;
          this.showToast('⚠️ Koneksi GAS timeout. Coba refresh halaman.', 'error');
        }
      }, 15000);

      // Guard: google.script.run hanya tersedia di dalam GAS WebApp
      if (typeof google === 'undefined' || !google.script) {
        clearTimeout(timeoutId);
        this.initialLoading = false;
        this.loading        = false;
        this.showToast('Mode Preview: Buka via URL Deploy GAS.', 'error');
        return;
      }

      google.script.run
        .withSuccessHandler(res => {
          clearTimeout(timeoutId);
          if (res.success) {
            this.incidents        = res.incidents    || [];
            this.masterData.locations  = res.locations   || [];
            this.masterData.categories = res.categories  || [];
            this.vlans            = res.vlans        || [];
            this.racks            = res.racks        || [];
            this.kpiProjects      = res.kpiProjects  || [];
            this.kpiTrainings     = res.kpiTrainings || [];
            this.wiki             = res.wiki         || [];
            this.masterItems      = res.masterItems  || [];
            this.passwords        = res.passwords    || [];
            this.masterUsers      = res.masterUsers  || [];
            this.licenses         = res.licenses     || [];
            this.checklists       = res.checklists   || [];
          } else {
            this.showToast('Error: ' + (res.message || 'Unknown error'), 'error');
          }
          this._populateReportYears();
          this.initialLoading = false;
          this.loading        = false;
        })
        .withFailureHandler(err => {
          clearTimeout(timeoutId);
          this.showToast('Gagal terhubung ke GAS. Coba refresh.', 'error');
          this.initialLoading = false;
          this.loading        = false;
        })
        .getInitialData();
    },

    _emptyChecklistRow() {
      return { parameter:'', standarLimit:'', potensiResiko:'', frekuensi:'MINGGUAN', statusBaik:'', keterangan:'' };
    },
    openChecklistModal(item = null) {
      if (item) {
        this.formChecklist = {
          id: item.ID, formCode: item['Form Code'] || '',
          judul: item.Judul || '',
          tanggal: (item.Tanggal || '').substring(0, 10),
          site: item.Site || '',
          items: JSON.parse(JSON.stringify(item.Items_JSON || []))
        };
      } else {
        this.formChecklist = {
          id:null, formCode:'', judul:'FORM CHECKLIST PERANGKAT IT',
          tanggal: this._today(), site:'',
          items: this._defaultChecklistTemplate()
        };
      }
      this.showChecklistModal = true;
    },
    addChecklistCategory() {
      this.formChecklist.items.push({ categoryName:'', rows:[this._emptyChecklistRow()] });
    },
    removeChecklistCategory(catIdx) {
      this.formChecklist.items.splice(catIdx, 1);
    },
    addChecklistRow(catIdx) {
      this.formChecklist.items[catIdx].rows.push(this._emptyChecklistRow());
    },
    removeChecklistRow(catIdx, rowIdx) {
      this.formChecklist.items[catIdx].rows.splice(rowIdx, 1);
    },
    countChecklistStatus(chk, statusVal) {
      let count = 0;
      (chk.Items_JSON || []).forEach(cat => {
        (cat.rows || []).forEach(row => { if (row.statusBaik === statusVal) count++; });
      });
      return count;
    },
    countChecklistRows(chk) {
      let count = 0;
      (chk.Items_JSON || []).forEach(cat => { count += (cat.rows || []).length; });
      return count;
    },

    // ── License helpers ───────────────────────────────────────
    syncLicenseProduct() {
      if (this.formLicense.productName && this.formLicense.productName !== '__manual__') {
        const found = this.masterItems.find(it => it['Item Name'] === this.formLicense.productName);
        if (found && !this.formLicense.partNumber) {
          this.formLicense.partNumber = found['Serial Number'] || '';
        }
      }
    },
    syncLicenseItem() {
      if (this.formLicense.laptopBrandType) {
        const found = this.masterItems.find(it => {
          const label = (it.Brand ? it.Brand + ' ' : '') + it['Item Name'];
          return label === this.formLicense.laptopBrandType || this.formLicense.laptopBrandType.startsWith(label);
        });
        this.formLicense.itemId = found ? found.ID : '';
      }
    },

      const icons = {
        Server: 'fas fa-server', Switch: 'fas fa-network-wired',
        Router: 'fas fa-route', UPS: 'fas fa-car-battery', Storage: 'fas fa-database'
      };
      return icons[type] || 'fas fa-box';
    },
    saveUSlot() {
      if (!this.formU.name.trim()) {
        delete this.formRack.devices[this.currentUEdit];
      } else {
        this.formRack.devices[this.currentUEdit] = { ...this.formU };
      }
      this.showUModal = false;
    },

    // ── Image / File Processing ───────────────────────────────
    processImageFile(file, maxDim, quality, callback) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > h && w > maxDim) { h *= maxDim / w; w = maxDim; }
          else if (h > maxDim)     { w *= maxDim / h; h = maxDim; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          callback(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    },
    handleMultiplePhotoUpload(e, targetArr) {
      this.processImageFile(e.target.files[0], 600, 0.5, b64 => targetArr.push(b64));
    },
    handleStepImageUpload(e, idx) {
      this.processImageFile(e.target.files[0], 600, 0.5, b64 => { this.formWiki.steps[idx].image = b64; });
    },
    handlePdfUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { alert('Maks. ukuran PDF adalah 2MB.'); return; }
      const reader = new FileReader();
      reader.onload = ev => { this.formWiki.pdf = ev.target.result; };
      reader.readAsDataURL(file);
    },

    // ══════════════════════════════════════════════════════════
    //  FORM SUBMIT ENGINE
    // ══════════════════════════════════════════════════════════
    _submit(fn, data, closeKey) {
      this[closeKey]     = false;
      this.submitLoading = true;
      google.script.run
        .withSuccessHandler(res => {
          this.submitLoading = false;
          this.showToast(res.message, res.success ? 'success' : 'error');
          if (res.success) this.fetchData();
        })
        .withFailureHandler(err => {
          this.submitLoading = false;
          this.showToast('Error: ' + err.message, 'error');
        })
        [fn](data);
    },

    // ══════════════════════════════════════════════════════════
    //  TOAST SYSTEM
    // ══════════════════════════════════════════════════════════
    showToast(msg, type = 'success') {
      const id = Date.now();
      this.toasts.push({ id, msg, type });
      setTimeout(() => this.removeToast(id), 4500);
    },
    removeToast(id) {
      this.toasts = this.toasts.filter(t => t.id !== id);

    // ── Incidents ─────────────────────────────────────────────
    get filteredIncidents() {
      let d = [...this.incidents];
      if (this.searchQuery) {
        const q = this.searchQuery.toLowerCase();
        d = d.filter(i =>
          (i.ID || '').toLowerCase().includes(q) ||
          (i.Description || '').toLowerCase().includes(q) ||
          (i.Location || '').toLowerCase().includes(q) ||
          (i.Category || '').toLowerCase().includes(q)
        );
      }
      if (this.statusFilter !== 'All') d = d.filter(i => i.Status === this.statusFilter);
      return d.sort((a, b) => String(b.ID).localeCompare(String(a.ID)));
    },
    get paginatedIncidents() {
      const s = (this.incidentPage - 1) * this.incidentPerPage;
      return this.filteredIncidents.slice(s, s + this.incidentPerPage);
    },
    get incidentTotalPages() {
      return Math.max(1, Math.ceil(this.filteredIncidents.length / this.incidentPerPage));
    },

    get paginatedRacks() {

      if (this.pwFilterLoc) d = d.filter(p => String(p.Location || '') === this.pwFilterLoc);
      if (this.pwFilterStatus === 'active')   d = d.filter(p => p['Is Active'] === true);
      if (this.pwFilterStatus === 'inactive') d = d.filter(p => p['Is Active'] === false);

    // ── Licenses ──────────────────────────────────────────────
    get filteredLicenses() {

      if (this.licFilter === 'pending')   d = d.filter(l => !l['Tanggal Aktivasi'] || String(l['Tanggal Aktivasi']).trim() === '');

          String(c.Judul || '').toLowerCase().includes(q) ||

      const s = (this.checklistPage - 1) * this.checklistPerPage;

    get checklistTotalPages() {

    },

    // ══════════════════════════════════════════════════════════
    //  REPORT MODULE
    // ══════════════════════════════════════════════════════════

    // ── Load report dari backend ──────────────────────────────
    loadReport() {
      if (typeof google === 'undefined' || !google.script) {
        this.showToast('Hanya tersedia di GAS WebApp.', 'error');
        return;
      }
      this.reportLoading = true;
      this.reportData    = null;
      google.script.run
        .withSuccessHandler(res => {
          this.reportLoading = false;
          if (res.success) {
            this.reportData           = res;
            this.reportAvailableYears = res.years || this.reportAvailableYears;
            this.reportTableSearch    = '';
          } else {
            this.showToast('Gagal load report: ' + (res.message || ''), 'error');
          }
        })
        .withFailureHandler(err => {
          this.reportLoading = false;
          this.showToast('Error report: ' + err.message, 'error');
        })
        .getIncidentReport(this.reportFilter);
    },

    // ── Export ke Google Sheets ───────────────────────────────
    exportReportExcel() {
      if (!this.reportData) return this.showToast('Generate report dulu sebelum export.', 'error');
      if (typeof google === 'undefined' || !google.script) return;
      this.reportExportLoading = true;
      this.reportExportMsg     = 'Membuat file Excel di Google Drive...';
      google.script.run
        .withSuccessHandler(res => {
          this.reportExportLoading = false;
          if (res.success) {
            this.showToast('✅ ' + res.message, 'success');
            // Buka Google Sheets di tab baru
            setTimeout(() => window.open(res.url, '_blank'), 300);
          } else {
            this.showToast('Export gagal: ' + res.message, 'error');
          }
        })
        .withFailureHandler(err => {
          this.reportExportLoading = false;
          this.showToast('Export error: ' + err.message, 'error');
        })
        .exportReportToSheets(this.reportFilter);
    },

    // ── Export ke PDF ─────────────────────────────────────────
    exportReportPdf() {
      if (!this.reportData) return this.showToast('Generate report dulu sebelum export.', 'error');
      if (typeof google === 'undefined' || !google.script) return;
      this.reportExportLoading = true;
      this.reportExportMsg     = 'Membuat PDF di server Google...';
      google.script.run
        .withSuccessHandler(res => {
          this.reportExportLoading = false;
          if (res.success) {
            if (res.base64) {
              // Download PDF langsung dari base64
              const byteChars  = atob(res.base64);
              const byteArrays = [];
              for (let i = 0; i < byteChars.length; i += 512) {
                const slice = byteChars.slice(i, i + 512);
                const bytes = new Array(slice.length);
                for (let j = 0; j < slice.length; j++) bytes[j] = slice.charCodeAt(j);
                byteArrays.push(new Uint8Array(bytes));
              }
              const blob = new Blob(byteArrays, { type: 'application/pdf' });
              const url  = URL.createObjectURL(blob);
              const a    = document.createElement('a');
              a.href     = url;
              a.download = res.fileName || 'Laporan_Insiden_IT.pdf';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              this.showToast('✅ PDF berhasil diunduh!', 'success');
            }
            // Jika ada URL Sheets atau Drive, tawarkan di toast
            if (res.sheetsUrl) {
              setTimeout(() => {
                if (confirm('File juga tersimpan di Google Drive.\nBuka file Drive sekarang?')) {
                  window.open(res.driveUrl || res.sheetsUrl, '_blank');
                }
              }, 800);
            }
            if (res.pdfFailed) {
              this.showToast('PDF tidak tersedia, membuka Sheets...', 'error');
              setTimeout(() => window.open(res.sheetsUrl, '_blank'), 500);
            }
          } else {
            this.showToast('Export PDF gagal: ' + res.message, 'error');
          }
        })
        .withFailureHandler(err => {
          this.reportExportLoading = false;
          this.showToast('Export PDF error: ' + err.message, 'error');
        })
        .exportReportToPdf(this.reportFilter);
    },

    // ── Computed: filter tabel detail dalam report ────────────
    get filteredReportTable() {
      if (!this.reportData || !this.reportData.tableRows) return [];
      if (!this.reportTableSearch) return this.reportData.tableRows;
      const q = this.reportTableSearch.toLowerCase().trim();
      return this.reportData.tableRows.filter(r =>
        String(r.id || '').toLowerCase().includes(q) ||
        String(r.location || '').toLowerCase().includes(q) ||
        String(r.category || '').toLowerCase().includes(q) ||
        String(r.description || '').toLowerCase().includes(q) ||
        String(r.status || '').toLowerCase().includes(q) ||
        String(r.tanggal || '').toLowerCase().includes(q)
      );
    }

  };
}
